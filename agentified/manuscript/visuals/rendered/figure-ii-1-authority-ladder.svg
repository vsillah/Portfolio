<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Authority Ladder</title>
  <desc id="desc">Authority climbs only when evidence climbs with it.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#C79A3B"/>
    </marker>
    <marker id="arrowTeal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2A8C82"/>
    </marker>
    <marker id="arrowInk" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1F2937"/>
    </marker>
  </defs>
  <rect width="1600" height="1000" fill="#111827"/>
  <rect x="34" y="34" width="1532" height="932" rx="22" fill="#F8F5EE" stroke="#C79A3B" stroke-width="4"/>
  <text x="800" y="88" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#1F2937">Authority Ladder</text>
  <text x="800" y="130" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="22" fill="#5B6472">Authority climbs only when evidence climbs with it.</text>

  <g>

  <g filter="url(#shadow)">
    <rect x="120" y="230" width="250" height="155" rx="18" fill="#FFFFFF" stroke="#D8C9A8" stroke-width="3"/>
    <rect x="120" y="230" width="250" height="12" rx="6" fill="#C79A3B"/>
    <text x="245" y="282" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#1F2937">Prepare</text>
    <text x="245" y="318" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">draft, summarize,</text>
<text x="245" y="343" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">classify</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="410" y="230" width="250" height="155" rx="18" fill="#FFFFFF" stroke="#D8C9A8" stroke-width="3"/>
    <rect x="410" y="230" width="250" height="12" rx="6" fill="#C79A3B"/>
    <text x="535" y="282" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#1F2937">Recommend</text>
    <text x="535" y="318" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">suggest next action</text>
<text x="535" y="343" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">with evidence</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="700" y="230" width="250" height="155" rx="18" fill="#FFFFFF" stroke="#D8C9A8" stroke-width="3"/>
    <rect x="700" y="230" width="250" height="12" rx="6" fill="#2A8C82"/>
    <text x="825" y="282" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#1F2937">Route</text>
    <text x="825" y="318" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">move work to the</text>
<text x="825" y="343" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">right human lane</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="990" y="230" width="250" height="155" rx="18" fill="#FFFFFF" stroke="#D8C9A8" stroke-width="3"/>
    <rect x="990" y="230" width="250" height="12" rx="6" fill="#B65A4A"/>
    <text x="1115" y="282" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#1F2937">Stage</text>
    <text x="1115" y="318" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">prepare external</text>
<text x="1115" y="343" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">action for review</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1280" y="230" width="250" height="155" rx="18" fill="#FFFFFF" stroke="#D8C9A8" stroke-width="3"/>
    <rect x="1280" y="230" width="250" height="12" rx="6" fill="#B65A4A"/>
    <text x="1405" y="282" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#1F2937">Execute</text>
    <text x="1405" y="318" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">only after</text>
<text x="1405" y="343" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">explicit authority</text>
  </g>
    <line x1="370" y1="307" x2="410" y2="307" stroke="#C79A3B" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowGold)"/>
    <line x1="660" y1="307" x2="700" y2="307" stroke="#C79A3B" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowGold)"/>
    <line x1="950" y1="307" x2="990" y2="307" stroke="#C79A3B" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowGold)"/>
    <line x1="1240" y1="307" x2="1280" y2="307" stroke="#C79A3B" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowGold)"/>
    <rect x="440" y="520" width="230" height="64" rx="32" fill="#DDEFEA" stroke="#2A8C82" stroke-width="2"/>
  <text x="555" y="559" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#1F2937">Receipt required</text>
    <rect x="730" y="620" width="230" height="64" rx="32" fill="#DDEFEA" stroke="#2A8C82" stroke-width="2"/>
  <text x="845" y="659" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#1F2937">Source check</text>
    <rect x="1020" y="720" width="230" height="64" rx="32" fill="#F4DFDA" stroke="#B65A4A" stroke-width="2"/>
  <text x="1135" y="759" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#1F2937">Human gate</text>
    <rect x="1290" y="820" width="230" height="64" rx="32" fill="#F4DFDA" stroke="#B65A4A" stroke-width="2"/>
  <text x="1405" y="859" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#1F2937">Rollback path</text>
    <line x1="535" y1="385" x2="535" y2="520" stroke="#2A8C82" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8" marker-end="url(#arrowTeal)"/>
    <line x1="825" y1="385" x2="825" y2="620" stroke="#2A8C82" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8" marker-end="url(#arrowTeal)"/>
    <line x1="1115" y1="385" x2="1115" y2="720" stroke="#B65A4A" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8" marker-end="url(#arrowInk)"/>
    <line x1="1405" y1="385" x2="1405" y2="820" stroke="#B65A4A" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8" marker-end="url(#arrowInk)"/>
    <rect x="142" y="830" width="820" height="64" rx="18" fill="#172033"/>
    <text x="552" y="872" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="28" font-weight="850" fill="#E2C46F">The higher the side effect, the stronger the gate.</text>
  </g>
</svg>
