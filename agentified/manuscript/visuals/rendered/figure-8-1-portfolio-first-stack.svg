    <text x="800" y="676" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#5B6472">receipts, approvals, evals, drift checks</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="390" y="712" width="820" height="92" rx="16" fill="#FFFFFF" stroke="#D8C9A8" stroke-width="3"/>
    <rect x="390" y="712" width="820" height="12" rx="6" fill="#2A8C82"/>
    <text x="800" y="754" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="24" font-weight="850" fill="#1F2937">Mission Control</text>
    <text x="800" y="784" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#5B6472">inspect, route, approve, recover</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="390" y="820" width="820" height="92" rx="16" fill="#FFFFFF" stroke="#D8C9A8" stroke-width="3"/>
    <rect x="390" y="820" width="820" height="12" rx="6" fill="#C79A3B"/>
    <text x="800" y="862" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="24" font-weight="850" fill="#1F2937">Public-safe proof</text>
    <text x="800" y="892" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#5B6472">exports without raw private logs</text>
  </g>
    <line x1="1248" y1="210" x2="1248" y2="315" stroke="#2A8C82" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
    <line x1="1248" y1="318" x2="1248" y2="423" stroke="#2A8C82" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
    <line x1="1248" y1="426" x2="1248" y2="531" stroke="#2A8C82" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
    <line x1="1248" y1="534" x2="1248" y2="639" stroke="#2A8C82" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
    <line x1="1248" y1="642" x2="1248" y2="747" stroke="#2A8C82" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
    <line x1="1248" y1="750" x2="1248" y2="855" stroke="#2A8C82" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
    <rect x="96" y="445" width="210" height="120" rx="18" fill="#172033"/>
    <text x="201" y="492" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="24" font-weight="850" fill="#E2C46F">Portfolio</text>
<text x="201" y="523" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="24" font-weight="850" fill="#E2C46F">came first</text>
    <rect x="1294" y="445" width="210" height="120" rx="18" fill="#F4DFDA" stroke="#B65A4A" stroke-width="3"/>
    <text x="1399" y="486" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="24" font-weight="850" fill="#B65A4A">No raw</text>
<text x="1399" y="517" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="24" font-weight="850" fill="#B65A4A">private logs</text>
  </g>
</svg>
