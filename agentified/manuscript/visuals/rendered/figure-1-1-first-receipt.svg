<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">The First Receipt</title>
  <desc id="desc">A visible envelope around an agent action, before authority expands.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#C79A3B"/>
    </marker>
    <marker id="arrowTeal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2A8C82"/>
    </marker>
    <marker id="arrowInk" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1F2937"/>
    </marker>
  </defs>
  <rect width="1600" height="1000" fill="#111827"/>
  <rect x="34" y="34" width="1532" height="932" rx="22" fill="#F8F5EE" stroke="#C79A3B" stroke-width="4"/>
  <text x="800" y="88" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#1F2937">The First Receipt</text>
  <text x="800" y="130" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="22" fill="#5B6472">A visible envelope around an agent action, before authority expands.</text>

  <g>

  <g filter="url(#shadow)">
    <rect x="90" y="230" width="300" height="170" rx="18" fill="#FFFFFF" stroke="#D8C9A8" stroke-width="3"/>
    <rect x="90" y="230" width="300" height="12" rx="6" fill="#C79A3B"/>
    <text x="240" y="282" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#1F2937">Agent run</text>
    <text x="240" y="318" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">Drafts or</text>
<text x="240" y="343" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">recommends work</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="230" width="300" height="170" rx="18" fill="#FFFFFF" stroke="#D8C9A8" stroke-width="3"/>
    <rect x="470" y="230" width="300" height="12" rx="6" fill="#2A8C82"/>
    <text x="620" y="282" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#1F2937">Receipt envelope</text>
    <text x="620" y="318" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">Evidence travels</text>
<text x="620" y="343" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">with the output</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="850" y="230" width="300" height="170" rx="18" fill="#FFFFFF" stroke="#D8C9A8" stroke-width="3"/>
    <rect x="850" y="230" width="300" height="12" rx="6" fill="#B65A4A"/>
    <text x="1000" y="282" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#1F2937">Human gate</text>
    <text x="1000" y="318" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">Approve, hold,</text>
<text x="1000" y="343" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">or reject</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1230" y="230" width="300" height="170" rx="18" fill="#FFFFFF" stroke="#D8C9A8" stroke-width="3"/>
    <rect x="1230" y="230" width="300" height="12" rx="6" fill="#C79A3B"/>
    <text x="1380" y="282" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#1F2937">Outcome</text>
    <text x="1380" y="318" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">Ship, revise,</text>
<text x="1380" y="343" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">or rollback</text>
  </g>
    <line x1="390" y1="315" x2="470" y2="315" stroke="#C79A3B" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowGold)"/>
    <line x1="770" y1="315" x2="850" y2="315" stroke="#C79A3B" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowGold)"/>
    <line x1="1150" y1="315" x2="1230" y2="315" stroke="#C79A3B" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowGold)"/>
    <rect x="192" y="520" width="1216" height="300" rx="24" fill="#DDEFEA" stroke="#2A8C82" stroke-width="3"/>
    <text x="800" y="570" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#1F2937">Inside the receipt</text>
    <rect x="245" y="620" width="185" height="58" rx="29" fill="#FFFFFF" stroke="#2A8C82" stroke-width="2"/>
  <text x="337.5" y="656" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#1F2937">Intent</text>
    <rect x="465" y="620" width="185" height="58" rx="29" fill="#FFFFFF" stroke="#2A8C82" stroke-width="2"/>
  <text x="557.5" y="656" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#1F2937">Agent</text>
    <rect x="685" y="620" width="185" height="58" rx="29" fill="#FFFFFF" stroke="#2A8C82" stroke-width="2"/>
  <text x="777.5" y="656" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#1F2937">Source</text>
    <rect x="905" y="620" width="185" height="58" rx="29" fill="#FFFFFF" stroke="#2A8C82" stroke-width="2"/>
  <text x="997.5" y="656" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#1F2937">Action</text>
    <rect x="1125" y="620" width="185" height="58" rx="29" fill="#FFFFFF" stroke="#2A8C82" stroke-width="2"/>
  <text x="1217.5" y="656" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#1F2937">Artifact</text>
    <rect x="245" y="710" width="185" height="58" rx="29" fill="#FFFFFF" stroke="#B65A4A" stroke-width="2"/>
  <text x="337.5" y="746" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#1F2937">Approval</text>
    <rect x="465" y="710" width="185" height="58" rx="29" fill="#FFFFFF" stroke="#2A8C82" stroke-width="2"/>
  <text x="557.5" y="746" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#1F2937">Cost</text>
    <rect x="685" y="710" width="185" height="58" rx="29" fill="#FFFFFF" stroke="#2A8C82" stroke-width="2"/>
  <text x="777.5" y="746" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#1F2937">Outcome</text>
    <rect x="905" y="710" width="185" height="58" rx="29" fill="#FFFFFF" stroke="#B65A4A" stroke-width="2"/>
  <text x="997.5" y="746" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#1F2937">Rollback</text>
    <rect x="1125" y="710" width="185" height="58" rx="29" fill="#F4DFDA" stroke="#B65A4A" stroke-width="2"/>
  <text x="1217.5" y="746" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#1F2937">Gaps</text>
    <rect x="278" y="850" width="1044" height="60" rx="18" fill="#172033"/>
    <text x="800" y="889" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#E2C46F">Every unknown field is a governance gap.</text>
  </g>
</svg>
