<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">SAM with the Trust Layer</title>
  <desc id="desc">Agentified builds on "Accelerated": speed becomes capacity when the evidence moves with the work.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#C79A3B"/>
    </marker>
    <marker id="arrowTeal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2A8C82"/>
    </marker>
    <marker id="arrowInk" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1F2937"/>
    </marker>
  </defs>
  <rect width="1600" height="1000" fill="#111827"/>
  <rect x="34" y="34" width="1532" height="932" rx="22" fill="#F8F5EE" stroke="#C79A3B" stroke-width="4"/>
  <text x="800" y="88" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#1F2937">SAM with the Trust Layer</text>
  <text x="800" y="130" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="22" fill="#5B6472">Agentified builds on "Accelerated": speed becomes capacity when the evidence moves with the work.</text>

  <g>

  <g filter="url(#shadow)">
    <rect x="90" y="210" width="430" height="280" rx="18" fill="#FFFFFF" stroke="#D8C9A8" stroke-width="3"/>
    <rect x="90" y="210" width="430" height="12" rx="6" fill="#C79A3B"/>
    <text x="305" y="262" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#1F2937">Signals</text>
    <text x="305" y="298" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">Raw noise</text>
<text x="305" y="323" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">to clear signal</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="585" y="210" width="430" height="280" rx="18" fill="#FFFFFF" stroke="#D8C9A8" stroke-width="3"/>
    <rect x="585" y="210" width="430" height="12" rx="6" fill="#C79A3B"/>
    <text x="800" y="262" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#1F2937">Alignment</text>
    <text x="800" y="298" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">Insight</text>
<text x="800" y="323" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">to shared direction</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1080" y="210" width="430" height="280" rx="18" fill="#FFFFFF" stroke="#D8C9A8" stroke-width="3"/>
    <rect x="1080" y="210" width="430" height="12" rx="6" fill="#C79A3B"/>
    <text x="1295" y="262" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#1F2937">Momentum</text>
    <text x="1295" y="298" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">Systems</text>
<text x="1295" y="323" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#5B6472">that compound</text>
  </g>
    <line x1="520" y1="350" x2="585" y2="350" stroke="#C79A3B" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowGold)"/>
    <line x1="1015" y1="350" x2="1080" y2="350" stroke="#C79A3B" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowGold)"/>
    <text x="800" y="545" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#1F2937">Agentified adds the trust layer</text>
    <rect x="135" y="620" width="210" height="72" rx="36" fill="#DDEFEA" stroke="#2A8C82" stroke-width="2"/>
  <text x="240" y="663" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#1F2937">Source</text>
    <rect x="390" y="620" width="210" height="72" rx="36" fill="#DDEFEA" stroke="#2A8C82" stroke-width="2"/>
  <text x="495" y="663" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#1F2937">Receipt</text>
    <rect x="645" y="620" width="210" height="72" rx="36" fill="#F4DFDA" stroke="#B65A4A" stroke-width="2"/>
  <text x="750" y="663" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#1F2937">Gate</text>
    <rect x="900" y="620" width="210" height="72" rx="36" fill="#DDEFEA" stroke="#2A8C82" stroke-width="2"/>
  <text x="1005" y="663" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#1F2937">Eval</text>
    <rect x="1155" y="620" width="210" height="72" rx="36" fill="#DDEFEA" stroke="#2A8C82" stroke-width="2"/>
  <text x="1260" y="663" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#1F2937">Proof</text>
    <line x1="345" y1="656" x2="390" y2="656" stroke="#2A8C82" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
    <line x1="600" y1="656" x2="645" y2="656" stroke="#2A8C82" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
    <line x1="855" y1="656" x2="900" y2="656" stroke="#2A8C82" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
    <line x1="1110" y1="656" x2="1155" y2="656" stroke="#2A8C82" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
    <line x1="305" y1="500" x2="235" y2="610" stroke="#B65A4A" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrowInk)"/>
    <line x1="800" y1="500" x2="750" y2="610" stroke="#B65A4A" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrowInk)"/>
    <line x1="1295" y1="500" x2="1005" y2="610" stroke="#B65A4A" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrowInk)"/>
    <text x="235" y="740" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#5B6472">What did it read?</text>
    <text x="750" y="740" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#5B6472">Who approves?</text>
    <text x="1005" y="740" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#5B6472">Did it work?</text>
    <rect x="176" y="805" width="1248" height="78" rx="18" fill="#172033"/>
    <text x="800" y="855" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#E2C46F">SAM creates acceleration. The trust layer makes acceleration governable.</text>
  </g>
</svg>
