<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">SAM with the Trust Layer</title>
  <desc id="desc">Acceleration becomes capacity when the evidence moves with the work.</desc>
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="14" height="14" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#555555" stroke-width="3"/>
    </pattern>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="16" height="16">
      <circle cx="4" cy="4" r="2.2" fill="#555555"/>
      <circle cx="12" cy="12" r="2.2" fill="#555555"/>
    </pattern>
    <pattern id="crosshatch" patternUnits="userSpaceOnUse" width="16" height="16">
      <path d="M0 0L16 16M16 0L0 16" stroke="#555555" stroke-width="2"/>
    </pattern>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#111111"/>
    </marker>
    <marker id="arrowLight" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#555555"/>
    </marker>
  </defs>
  <rect width="1600" height="1000" fill="#FFFFFF"/>
  <rect x="32" y="32" width="1536" height="936" fill="#FFFFFF" stroke="#111111" stroke-width="5"/>
  <text x="800" y="88" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#111111">SAM with the Trust Layer</text>
  <text x="800" y="128" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="22" fill="#2A2A2A">Acceleration becomes capacity when the evidence moves with the work.</text>

  <g>

  <g>
    <rect x="90" y="210" width="430" height="280" fill="#FFFFFF" stroke="#111111" stroke-width="4"/>
    <rect x="90" y="210" width="430" height="16" fill="#2A2A2A" stroke="#2A2A2A" stroke-width="0"/>
    <text x="305" y="264" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="25" font-weight="850" fill="#111111">Signals</text>
    <text x="305" y="300" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#2A2A2A">Raw noise</text>
<text x="305" y="324" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#2A2A2A">to clear signal</text>
  </g>

  <g>
    <rect x="585" y="210" width="430" height="280" fill="#F4F4F4" stroke="#111111" stroke-width="4"/>
    <rect x="585" y="210" width="430" height="16" fill="#2A2A2A" stroke="#2A2A2A" stroke-width="0"/>
    <text x="800" y="264" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="25" font-weight="850" fill="#111111">Alignment</text>
    <text x="800" y="300" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#2A2A2A">Insight</text>
<text x="800" y="324" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#2A2A2A">to shared direction</text>
  </g>

  <g>
    <rect x="1080" y="210" width="430" height="280" fill="#FFFFFF" stroke="#111111" stroke-width="4"/>
    <rect x="1080" y="210" width="430" height="16" fill="#2A2A2A" stroke="#2A2A2A" stroke-width="0"/>
    <text x="1295" y="264" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="25" font-weight="850" fill="#111111">Momentum</text>
    <text x="1295" y="300" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#2A2A2A">Systems</text>
<text x="1295" y="324" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#2A2A2A">that compound</text>
  </g>
    <line x1="520" y1="350" x2="585" y2="350" stroke="#111111" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="1015" y1="350" x2="1080" y2="350" stroke="#111111" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="800" y="545" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="28" font-weight="850" fill="#111111">Agentified adds the trust layer</text>
    <rect x="135" y="620" width="210" height="72" rx="36" fill="#FFFFFF" stroke="#111111" stroke-width="3"/>
  <text x="240" y="663" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#111111">Source</text>
    <rect x="390" y="620" width="210" height="72" rx="36" fill="url(#dots)" stroke="#111111" stroke-width="3"/>
  <text x="495" y="663" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#111111">Receipt</text>
    <rect x="645" y="620" width="210" height="72" rx="36" fill="url(#hatch)" stroke="#111111" stroke-width="5"/>
  <text x="750" y="663" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#111111">Gate</text>
    <rect x="900" y="620" width="210" height="72" rx="36" fill="#FFFFFF" stroke="#111111" stroke-width="3"/>
  <text x="1005" y="663" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#111111">Eval</text>
    <rect x="1155" y="620" width="210" height="72" rx="36" fill="url(#dots)" stroke="#111111" stroke-width="3"/>
  <text x="1260" y="663" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#111111">Proof</text>
    <line x1="345" y1="656" x2="390" y2="656" stroke="#111111" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="600" y1="656" x2="645" y2="656" stroke="#111111" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="855" y1="656" x2="900" y2="656" stroke="#111111" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="1110" y1="656" x2="1155" y2="656" stroke="#111111" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="305" y1="500" x2="235" y2="610" stroke="#111111" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrowLight)"/>
    <line x1="800" y1="500" x2="750" y2="610" stroke="#111111" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrowLight)"/>
    <line x1="1295" y1="500" x2="1005" y2="610" stroke="#111111" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrowLight)"/>
    <text x="235" y="740" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#2A2A2A">What did it read?</text>
    <text x="750" y="740" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#2A2A2A">Who approves?</text>
    <text x="1005" y="740" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#2A2A2A">Did it work?</text>
    <rect x="176" y="805" width="1248" height="78" fill="#111111"/>
    <text x="800" y="855" text-anchor="middle" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="30" font-weight="850" fill="#FFFFFF">SAM creates acceleration. The trust layer makes acceleration governable.</text>
  </g>
</svg>
